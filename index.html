<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoBanana — Лид-магниты</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      width: 100%;
    }
    
    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .logo {
      font-size: 48px;
      font-weight: 800;
      color: white;
      margin-bottom: 10px;
    }
    
    .logo span {
      color: #ffd700;
    }
    
    .subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.9);
    }
    
    .cards {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }
    
    .card-number {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 700;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    
    .card-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    
    .card-description {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }
    
    .arrow {
      display: inline-block;
      margin-left: 8px;
      transition: transform 0.3s ease;
    }
    
    .card:hover .arrow {
      transform: translateX(4px);
    }
    
    @media (max-width: 640px) {
      .logo {
        font-size: 36px;
      }
      
      .subtitle {
        font-size: 16px;
      }
      
      .card {
        padding: 24px;
      }
      
      .card-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">gobanana<span>.</span></div>
      <div class="subtitle">Гайды и лид-магниты для селлеров</div>
    </div>
    
    <div class="cards">
      <a href="/lead-magnet-01-white-background/" class="card">
        <div class="card-number">Гайд #1</div>
        <div class="card-title">Белый фон для WB и Ozon <span class="arrow">→</span></div>
        <div class="card-description">8 готовых промптов для создания студийных фото с белым фоном за 15 секунд. Без фотографа и студии.</div>
      </a>
      
      <a href="/lead-magnet-02-infographic/" class="card">
        <div class="card-number">Гайд #2</div>
        <div class="card-title">Инфографика для карточек <span class="arrow">→</span></div>
        <div class="card-description">Создание продающей инфографики для маркетплейсов с помощью AI. Промпты и примеры.</div>
      </a>
    </div>
  </div>
</body>
</html>
